<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Lost The Rep | STACKLY FIT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
<style>
:root{--ink:#0B0D10;--ink2:#14171C;--ink3:#1B1F26;--chalk:#F5F3EE;--mute:#9AA0A6;--signal:#FF5A2B;--signal2:#FFC145;--line:rgba(245,243,238,0.12);--ff-display:'Anton',sans-serif;--ff-body:'Manrope',sans-serif;--ff-mono:'Space Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--ink);color:var(--chalk);font-family:var(--ff-body);overflow-x:hidden;min-height:100vh;position:relative;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;}
::selection{background:var(--signal);color:var(--ink);}

/* Faint tiled sport-court texture behind everything */
.court-lines{position:fixed;inset:0;z-index:0;opacity:.05;pointer-events:none;
  background-image:
    linear-gradient(var(--chalk) 1px, transparent 1px),
    linear-gradient(90deg, var(--chalk) 1px, transparent 1px);
  background-size:64px 64px;}

/* Big soft glow blobs for depth */
.glow{position:fixed;border-radius:50%;filter:blur(120px);z-index:0;pointer-events:none;}
.glow-1{width:520px;height:520px;background:var(--signal);opacity:.16;top:-160px;left:-140px;}
.glow-2{width:460px;height:460px;background:var(--signal2);opacity:.1;bottom:-180px;right:-120px;}

.wrap{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;}

.eyebrow{font-family:var(--ff-mono);font-size:12px;letter-spacing:.3em;color:var(--signal2);text-transform:uppercase;margin-bottom:22px;display:flex;align-items:center;gap:10px;}
.eyebrow::before,.eyebrow::after{content:'';width:26px;height:1px;background:var(--line);}

/* Big 404 stack, styled like a scoreboard readout */
.score{position:relative;line-height:.82;margin-bottom:6px;}
.score-num{font-family:var(--ff-display);font-size:clamp(120px,26vw,300px);letter-spacing:-.01em;color:var(--chalk);position:relative;display:inline-block;}
.score-num .zero{color:var(--signal);position:relative;display:inline-block;}
.score-num .zero::after{content:'';position:absolute;inset:14% 10%;border:6px solid var(--ink);border-radius:50%;}

.whistle-tag{font-family:var(--ff-mono);font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:var(--mute);background:var(--ink2);border:1px solid var(--line);border-radius:100px;padding:8px 18px;margin-bottom:28px;display:inline-block;}
.whistle-tag span{color:var(--danger, var(--signal));color:var(--signal);}

h1.headline{font-family:var(--ff-display);font-size:clamp(28px,4.2vw,46px);text-transform:uppercase;letter-spacing:.01em;margin-bottom:16px;max-width:720px;}
h1.headline .accent{color:var(--signal2);}

p.sub{font-size:15px;line-height:1.7;color:var(--mute);max-width:460px;margin-bottom:42px;}
p.sub strong{color:var(--chalk);font-weight:700;}

.btn-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:56px;}
.btn{font-family:var(--ff-body);font-weight:700;font-size:13px;letter-spacing:.05em;text-transform:uppercase;padding:16px 32px;border-radius:100px;display:inline-flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;border:none;transition:background .25s,transform .15s,border-color .25s,color .25s;}
.btn svg{width:16px;height:16px;flex-shrink:0;}
.btn-fill{background:var(--signal);color:var(--ink);}
.btn-fill:hover{background:var(--signal2);}
.btn-fill:active{transform:scale(.97);}
.btn-outline{background:none;color:var(--chalk);border:1px solid var(--line);}
.btn-outline:hover{border-color:var(--signal);color:var(--signal2);}
.btn-outline:active{transform:scale(.97);}

.quick-links{display:flex;gap:10px 26px;flex-wrap:wrap;justify-content:center;font-family:var(--ff-mono);font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--mute);}
.quick-links a{position:relative;padding-bottom:2px;transition:color .25s;}
.quick-links a::after{content:'';position:absolute;left:0;bottom:0;width:0;height:1px;background:var(--signal2);transition:width .25s;}
.quick-links a:hover{color:var(--chalk);}
.quick-links a:hover::after{width:100%;}
.quick-links .dot{color:var(--line);}

/* Bouncing ball accent */
.ball{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--signal2);opacity:.7;bottom:120px;left:calc(50% - 7px);box-shadow:0 0 14px rgba(255,193,69,.5);}

@media(max-width:520px){
  .btn-row{flex-direction:column;width:100%;max-width:280px;}
  .btn{width:100%;}
}
</style>
</head>
<body>

<div class="court-lines" aria-hidden="true"></div>
<div class="glow glow-1" aria-hidden="true"></div>
<div class="glow glow-2" aria-hidden="true"></div>

<div class="wrap">
  <div class="eyebrow">Whistle Blown</div>

  <div class="score">
    <span class="score-num" id="scoreNum">4<span class="zero">0</span>4</span>
  </div>

  <div class="whistle-tag">Foul Called: <span>Page Not On The Roster</span></div>

  <h1 class="headline">Looks like this rep got <span class="accent">dropped</span></h1>
  <p class="sub">The page you're chasing doesn't exist, moved, or never made it off the bench. Let's get you back in the game — <strong>no penalty reps</strong>, we promise.</p>

  <div class="btn-row">
    <button type="button" class="btn btn-outline" id="goBackBtn">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Go Back
    </button>
    <a href="index.html" class="btn btn-fill">
      Return Home
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 11L12 3L21 11M5 9.5V21H19V9.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </div>
</div>

<script>
window.addEventListener('load', () => {
  const tl = gsap.timeline({defaults:{ease:'power3.out'}});
  tl.from('.eyebrow', {opacity:0, y:16, duration:.6})
    .from('#scoreNum', {opacity:0, y:40, scale:.9, duration:.8}, '-=.3')
    .from('.whistle-tag', {opacity:0, y:14, duration:.5}, '-=.35')
    .from('.headline', {opacity:0, y:16, duration:.6}, '-=.3')
    .from('.sub', {opacity:0, y:14, duration:.6}, '-=.4')
    .from('.btn-row .btn', {opacity:0, y:14, duration:.5, stagger:.1}, '-=.35')
    .from('.quick-links a', {opacity:0, y:10, duration:.4, stagger:.06}, '-=.3');

  // Subtle looping bounce on the accent ball
  gsap.to('#ball', {
    y:-70, duration:.55, ease:'power1.out', repeat:-1, yoyo:true,
    repeatDelay:.05
  });

  // Slow ambient drift on the glows for a bit of life
  gsap.to('.glow-1', {x:30, y:20, duration:9, repeat:-1, yoyo:true, ease:'sine.inOut'});
  gsap.to('.glow-2', {x:-30, y:-20, duration:11, repeat:-1, yoyo:true, ease:'sine.inOut'});
});

document.getElementById('goBackBtn').addEventListener('click', () => {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = 'index.html';
  }
});
</script>
</body>
</html>
